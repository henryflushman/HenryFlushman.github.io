<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Cesium Sim</title>

  <script src="../assets/cesium/Cesium.js"></script>
  <link href="../assets/cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #viewerControls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(255, 255, 255, 0.95);
      padding: 8px 10px;
      border-radius: 6px;
      font-family: sans-serif;
      font-size: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    #viewerControls label {
      margin-right: 6px;
    }

    #sceneInfo {
      margin-top: 6px;
      font-size: 12px;
      color: #7a3700;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div id="cesiumContainer"></div>

  <div id="viewerControls">
    <label for="rotationMode">View Mode:</label>
    <select id="rotationMode">
      <option value="fixed">Body-Fixed</option>
      <option value="icrf">Inertial (Earth only)</option>
    </select>

    <div id="sceneInfo"></div>
  </div>

  <script>
  window.CESIUM_BASE_URL = "../assets/cesium";

  const urlParams = new URLSearchParams(window.location.search);
  const sceneName = urlParams.get("sceneName") || "simple";
  const body = (urlParams.get("body") || "earth").toLowerCase();
  const tilesOnly = urlParams.get("tilesOnly") === "true";

  const tagFilter = (urlParams.get("tags") || "")
    .split(",")
    .map(tag => tag.trim())
    .filter(tag => tag.length > 0);

  console.log("Scene name:", sceneName);
  console.log("Selected body:", body);
  console.log("Filtering tags:", tagFilter);

  document.getElementById("sceneInfo").innerHTML =
    `<strong>Scene:</strong> ${sceneName}<br><strong>Body:</strong> ${body}` +
    (tagFilter.length > 0 ? `<br><strong>Tags:</strong> ${tagFilter.join(", ")}` : "");

  Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI1NWEyN2MzMS04MWViLTQ1ZTMtOWVkYS1lNDc0ODg5OGQ5ZDQiLCJpZCI6Mzg5Mzk4LCJpYXQiOjE3NzA3NzM5MTR9.IzmxEYYIrDuvrQxwEIPuhQDJnLwHxRcm1oxqcAC6kUE";

  const rotationModeDropdown = document.getElementById("rotationMode");
  let Sim = null;
  let icrfAdded = false;

  function getBodyCameraHeight(selectedBody) {
    const heights = {
      mercury: 12000000,
      venus: 18000000,
      earth: 20000000,
      moon: 6000000,
      mars: 10000000,
      jupiter: 80000000,
      saturn: 90000000,
      uranus: 70000000,
      neptune: 70000000,
      pluto: 4000000,
      sun: 300000000
    };
    return heights[selectedBody] || 20000000;
  }

  function extractAvailability(rawCzml) {
    const documentPacket = rawCzml.find(packet => packet.id === "document");
    if (!documentPacket || !documentPacket.availability) {
      return null;
    }

    const [startStr, stopStr] = documentPacket.availability.split("/");
    return {
      start: Cesium.JulianDate.fromIso8601(startStr),
      stop: Cesium.JulianDate.fromIso8601(stopStr)
    };
  }

  function applyTagFilterToDataSource(ds, tags) {
    if (tags.length === 0) return;

    const entities = ds.entities.values;
    for (let i = entities.length - 1; i >= 0; i--) {
      const id = entities[i].id;
      if (id !== "document" && !tags.some(tag => id.startsWith(tag + "/"))) {
        ds.entities.remove(entities[i]);
      }
    }
  }

  async function fetchJson(url, label) {
    const response = await fetch(url);
    if (!response.ok) {
      throw new Error(`${label} fetch failed: ${response.status} ${response.statusText}`);
    }
    return response.json();
  }

  async function createEarthViewer() {
    return new Cesium.Viewer("cesiumContainer", {
      terrainProvider: Cesium.createWorldTerrain?.() || new Cesium.EllipsoidTerrainProvider(),
      animation: true,
      timeline: true,
      baseLayerPicker: true,
      fullscreenButton: true,
      homeButton: true,
      geocoder: false,
      sceneModePicker: true,
      infoBox: true,
      selectionIndicator: true,
      contextOptions: { alpha: true }
    });
  }

  async function createMarsViewer(containerId, ionToken = "") {
  try {
    console.log("[Cesium] Creating Mars viewer...");

    if (ionToken) {
      Cesium.Ion.defaultAccessToken = ionToken;
    }

    const marsEllipsoid = new Cesium.Ellipsoid(3396190.0, 3396190.0, 3376200.0);

    const viewer = new Cesium.Viewer(containerId, {
      terrainProvider: false,
      baseLayer: false,
      baseLayerPicker: false,
      geocoder: false,
      shadows: false,
      globe: new Cesium.Globe(marsEllipsoid),
      skyBox: Cesium.SkyBox.createEarthSkyBox(),
      skyAtmosphere: new Cesium.SkyAtmosphere(marsEllipsoid),
      sceneModePicker: true,
      homeButton: true,
      fullscreenButton: true,
      timeline: true,
      animation: true,
      selectionIndicator: true,
      infoBox: true,
      contextOptions: { alpha: true }
    });
    
    Cesium.Ellipsoid.default = marsEllipsoid;
    viewer.scene.screenSpaceCameraController.minimumZoomDistance = 0.01;

    // Always add free NASA Mars imagery so the globe is never blank
    const marsImagery = new Cesium.UrlTemplateImageryProvider({
      url: "https://trek.nasa.gov/tiles/Mars/EQ/Mars_Viking_MDIM21_ClrMosaic_global_232m/1.0.0/default/default028mm/{z}/{y}/{x}.jpg", //doesnt do anything
      minimumLevel: 0,
      maximumLevel: 8,
      tilingScheme: new Cesium.GeographicTilingScheme()
    });
    viewer.scene.globe.imageryLayers.addImageryProvider(marsImagery);
    viewer.scene.globe.show = true;

        try {
      const marsTileset = await Cesium.Cesium3DTileset.fromIonAssetId(3644333);
      viewer.scene.primitives.add(marsTileset);
      await viewer.zoomTo(marsTileset);
      viewer.scene.globe.show = false;
      console.log("[Cesium] Mars tileset loaded successfully");

      const roverTileset = await Cesium.Cesium3DTileset.fromIonAssetId(4579967);

      const roverLongitude = 77.4509;
      const roverLatitude = 18.4446;
      const roverHeight = 5000.0;

      const roverPosition = Cesium.Cartesian3.fromDegrees(
        roverLongitude,
        roverLatitude,
        roverHeight
      );
      
      viewer.entities.add({
        name: "Rover Marker",
        position: roverPosition,
        point: {
          pixelSize: 20,
          color: Cesium.Color.YELLOW,
          outlineColor: Cesium.Color.BLACK,
          outlineWidth: 2
        },
        label: {
          text: "ROVER",
          font: "16px sans-serif",
          fillColor: Cesium.Color.YELLOW,
          outlineColor: Cesium.Color.BLACK,
          outlineWidth: 2,
          showBackground: true,
          verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
          pixelOffset: new Cesium.Cartesian2(0, -20)
        }
      });

      const enuMatrix = Cesium.Transforms.eastNorthUpToFixedFrame(roverPosition);
      const scaleMatrix = Cesium.Matrix4.fromUniformScale(10000.0);
      roverTileset.modelMatrix = Cesium.Matrix4.multiply(
        enuMatrix,
        scaleMatrix,
        new Cesium.Matrix4()
      );

      viewer.scene.primitives.add(roverTileset);
      await viewer.zoomTo(roverTileset);

      console.log("[Cesium] Rover tileset loaded successfully");
    } catch (error) {
      console.warn("[Cesium] Mars or rover 3D tileset unavailable, using fallback:", error);
    }

    return viewer;
  } catch (error) {
    console.error("[Cesium] Error creating Mars viewer:", error);
    throw error;
  }
}

  function icrfTransform(scene, time) {
    if (body !== "earth") return;
    if (scene.mode !== Cesium.SceneMode.SCENE3D) return;

    const icrfToFixed = Cesium.Transforms.computeIcrfToFixedMatrix(time);
    if (Cesium.defined(icrfToFixed)) {
      const camera = Sim.camera;
      const offset = Cesium.Cartesian3.clone(camera.position);
      const transform = Cesium.Matrix4.fromRotationTranslation(icrfToFixed);
      camera.lookAtTransform(transform, offset);
    }
  }

  function disableIcrfModeForNonEarth() {
    if (body !== "earth") {
      rotationModeDropdown.value = "fixed";
      rotationModeDropdown.options[1].disabled = true;
      rotationModeDropdown.options[1].text = "Inertial (Earth only - disabled)";
    }
  }

  function setRotationMode(selected) {
    if (selected === "icrf") {
      if (body !== "earth") {
        rotationModeDropdown.value = "fixed";
        return;
      }

      if (!icrfAdded) {
        Sim.scene.postUpdate.addEventListener(icrfTransform);
        icrfAdded = true;
      }
      Sim.camera.flyHome(0);
      return;
    }

    if (icrfAdded) {
      Sim.scene.postUpdate.removeEventListener(icrfTransform);
      icrfAdded = false;
    }

    Sim.camera.lookAtTransform(Cesium.Matrix4.IDENTITY);
    Sim.camera.flyHome(0);
  }

  rotationModeDropdown.addEventListener("change", function(event) {
    setRotationMode(event.target.value);
  });

  async function loadSceneDataSource() {
    const sceneCzmlUrl = "Constellations/" + sceneName + ".czml";
    console.log("Loading scene CZML:", sceneCzmlUrl);

    const rawSceneCzml = await fetchJson(sceneCzmlUrl, "Scene CZML");
    const availability = extractAvailability(rawSceneCzml);

    const sceneDs = await Cesium.CzmlDataSource.load(rawSceneCzml);
    applyTagFilterToDataSource(sceneDs, tagFilter);
    await Sim.dataSources.add(sceneDs);

    if (availability) {
      Sim.clock.startTime = availability.start.clone();
      Sim.clock.stopTime = availability.stop.clone();
      Sim.clock.currentTime = availability.start.clone();
      Sim.clock.clockRange = Cesium.ClockRange.LOOP_STOP;
      Sim.clock.clockStep = Cesium.ClockStep.SYSTEM_CLOCK_MULTIPLIER;
      Sim.clock.multiplier = 1000;
      Sim.timeline.zoomTo(availability.start, availability.stop);
    }
  }

  async function initializeViewer() {
    try {
      if (body === "mars") {
        Sim = await createMarsViewer("cesiumContainer");
      } else {
        Sim = await createEarthViewer();
      }

      Sim.scene.globe.enableLighting = true;
      Sim.scene.sun.show = true;
      Sim.scene.light = new Cesium.SunLight();

      if (!(body === "mars" && tilesOnly)) {
        Sim.scene.camera.setView({
          destination: Cesium.Cartesian3.fromDegrees(0, 0, getBodyCameraHeight(body))
        });
      }

      disableIcrfModeForNonEarth();

      if (!tilesOnly) {
        await loadSceneDataSource();
      }
    } catch (err) {
      console.error("Viewer initialization failed:", err);
    }
  }

  initializeViewer();
</script>
</body>
</html>
